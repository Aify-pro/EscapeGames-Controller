; ============================================================
;  Escape Game Central Controller - WT32-ETH01
;  Étapes 1-5 : Event Bus + State + Relais + Inputs + Web temps réel
; ============================================================
[env:wt32-eth01]
platform        = espressif32
board           = wt32-eth01
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

; --- Partitions double OTA + LittleFS (4 Mo) ---
board_build.partitions  = partitions_ota.csv
board_build.filesystem  = littlefs

; --- Résolution de libs (recommandé par ESP32Async) ---
lib_compat_mode = strict
lib_ldf_mode    = chain

; --- Dépendances ---
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.7.0

; OTA réseau (à activer une fois la 1ère flash USB faite) :
; upload_protocol = espota
; upload_port     = 192.168.1.50
; upload_flags    = --auth=CHANGE_ME

build_flags =
    -I src
    -D CORE_DEBUG_LEVEL=3
    -D FW_VERSION=\"0.5.0\"
