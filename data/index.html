<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<title>Escape CTRL</title>
<style>
  :root{
    --void:#0a0e14; --panel:#111722; --panel-2:#0e141d; --line:#1d2733;
    --ink:#e6edf3; --muted:#7d8da1;
    --on:#3fb950; --on-dim:#163a22; --off:#28313e;
    --momentary:#e3a008; --failsafe:#3b82f6; --alert:#f0506e;
    --radius:10px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--void); color:var(--ink); font-family:var(--sans);
    padding:18px; min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .eyebrow{
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); font-weight:700; margin:26px 2px 12px;
    display:flex; align-items:center; gap:10px;
  }
  .eyebrow::after{content:""; flex:1; height:1px; background:var(--line)}

  /* ---- Status rail (signature) ---- */
  .rail{
    display:flex; flex-wrap:wrap; align-items:center; gap:14px;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line); border-top:2px solid var(--on);
    border-radius:var(--radius); padding:14px 18px;
  }
  .brand{font-weight:800; letter-spacing:.14em; text-transform:uppercase; font-size:15px}
  .brand small{display:block; font:500 10px/1.4 var(--mono); color:var(--muted); letter-spacing:.1em}
  .rail .sep{width:1px; height:30px; background:var(--line)}
  .stat{display:flex; flex-direction:column; gap:2px}
  .stat .k{font:600 9px/1 var(--mono); letter-spacing:.14em; color:var(--muted); text-transform:uppercase}
  .stat .v{font:600 13px/1.2 var(--mono)}
  .dot{width:9px; height:9px; border-radius:50%; display:inline-block; background:var(--off)}
  .dot.live{background:var(--on); animation:beat 2.4s ease-in-out infinite}
  .dot.dead{background:var(--alert)}
  @keyframes beat{0%,100%{box-shadow:0 0 0 0 rgba(63,185,80,.5)}50%{box-shadow:0 0 0 6px rgba(63,185,80,0)}}
  .spacer{flex:1}
  .game{display:flex; align-items:center; gap:12px}
  .badge{font:700 12px/1 var(--mono); letter-spacing:.12em; padding:8px 12px; border-radius:8px;
    background:var(--off); color:var(--muted); text-transform:uppercase}
  .badge.run{background:var(--alert); color:#fff; animation:beat 1.6s ease-in-out infinite}
  button{font-family:var(--sans); cursor:pointer; border:none}
  .btn{
    background:var(--panel); color:var(--ink); border:1px solid var(--line);
    padding:9px 16px; border-radius:8px; font-weight:700; font-size:13px; letter-spacing:.04em;
  }
  .btn:hover{border-color:var(--muted)}
  .btn:focus-visible{outline:2px solid var(--on); outline-offset:2px}

  /* ---- Scenes / sequences ---- */
  .grid-seq{display:flex; flex-wrap:wrap; gap:10px}
  .scene{
    background:linear-gradient(180deg,var(--panel),var(--panel-2)); color:var(--ink);
    border:1px solid var(--line); border-left:3px solid var(--failsafe);
    border-radius:var(--radius); padding:12px 20px; font-weight:700; font-size:14px;
    letter-spacing:.03em; transition:transform .08s, border-color .15s, box-shadow .15s;
  }
  .scene:hover{border-color:var(--failsafe); box-shadow:0 0 14px rgba(59,130,246,.14)}
  .scene:active{transform:translateY(1px)}
  .scene.flash{box-shadow:0 0 0 2px var(--failsafe) inset}
  .scene:focus-visible{outline:2px solid var(--on); outline-offset:2px}
  .scene.disabled{opacity:.4; pointer-events:none}

  /* ---- Relay grid ---- */
  .grid-relays{display:grid; gap:10px; grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}
  .tile{
    position:relative; text-align:left; background:var(--panel); color:var(--ink);
    border:1px solid var(--line); border-left:3px solid var(--off);
    border-radius:var(--radius); padding:13px 13px 12px; transition:transform .08s, background .15s, box-shadow .15s;
  }
  .tile .idx{font:600 10px/1 var(--mono); color:var(--muted)}
  .tile .nm{font-weight:700; font-size:14px; margin-top:7px; line-height:1.25; word-break:break-word}
  .tile .st{font:700 10px/1 var(--mono); letter-spacing:.12em; margin-top:9px; text-transform:uppercase; color:var(--muted)}
  .tile[data-type="1"]{border-left-color:var(--momentary)}
  .tile[data-type="2"]{border-left-color:var(--failsafe)}
  .tile.on{background:linear-gradient(180deg,#10261a,#0f1d16); border-color:var(--on); box-shadow:inset 0 0 0 1px rgba(63,185,80,.25), 0 0 16px rgba(63,185,80,.12)}
  .tile.on .st{color:var(--on)}
  .tile:active{transform:translateY(1px)}
  .tile:focus-visible{outline:2px solid var(--on); outline-offset:2px}
  .tile.disabled{opacity:.4; pointer-events:none}

  /* ---- Inputs ---- */
  .grid-inputs{display:grid; gap:8px; grid-template-columns:repeat(auto-fill,minmax(104px,1fr))}
  .chip{display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--line);
    border-radius:8px; padding:9px 10px}
  .chip .led{width:10px; height:10px; border-radius:50%; background:var(--off); flex:none; transition:.12s}
  .chip.hi .led{background:var(--on); box-shadow:0 0 9px var(--on)}
  .chip .lbl{font:600 11px/1.2 var(--mono); color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .chip.hi .lbl{color:var(--ink)}

  /* ---- Log ---- */
  .log{background:var(--panel-2); border:1px solid var(--line); border-radius:var(--radius);
    font:500 12px/1.6 var(--mono); padding:12px 14px; max-height:200px; overflow:auto; color:var(--muted)}
  .log b{color:var(--ink); font-weight:600}

  .offline{position:fixed; inset:0 0 auto 0; background:var(--alert); color:#fff;
    text-align:center; font:700 13px/1 var(--sans); padding:10px; letter-spacing:.04em;
    transform:translateY(-100%); transition:.2s}
  .offline.show{transform:none}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>
  <div class="offline" id="offline">Liaison perdue — reconnexion…</div>

  <div class="rail">
    <div class="brand">Escape&nbsp;CTRL<small id="fw">fw —</small></div>
    <div class="sep"></div>
    <div class="stat"><span class="k">Liaison</span>
      <span class="v"><span class="dot dead" id="linkDot"></span> <span id="linkTxt">—</span></span></div>
    <div class="stat"><span class="k">Adresse IP</span><span class="v" id="ip">—</span></div>
    <div class="sep"></div>
    <div class="stat"><span class="k">Battement</span>
      <span class="v"><span class="dot" id="hbDot"></span> <span id="hbTxt">—</span></span></div>
    <div class="spacer"></div>
    <div class="game">
      <div class="stat"><span class="k">Partie</span><span class="badge" id="gameBadge">arrêtée</span></div>
      <button class="btn" id="gameBtn">Démarrer</button>
    </div>
  </div>

  <div class="eyebrow">Scènes</div>
  <div class="grid-seq" id="seqs"></div>

  <div class="eyebrow">Relais</div>
  <div class="grid-relays" id="relays"></div>

  <div class="eyebrow">Entrées</div>
  <div class="grid-inputs" id="inputs"></div>

  <div class="eyebrow">Journal d'événements</div>
  <div class="log" id="log"></div>

<script>
const $ = s => document.querySelector(s);
const TYPE = {0:"on/off",1:"impulsion",2:"fail-safe"};
let ws, game=false, hbTimer;

function connect(){
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => { setOffline(false); send({cmd:"snapshot"}); };
  ws.onclose = () => { setOffline(true); $("#hbDot").className="dot dead"; setTimeout(connect,1500); };
  ws.onmessage = ev => handle(JSON.parse(ev.data));
}
function send(o){ if(ws && ws.readyState===1) ws.send(JSON.stringify(o)); }
function setOffline(b){ $("#offline").classList.toggle("show",b); }

function handle(m){
  switch(m.t){
    case "snapshot": buildRelays(m.relays); buildInputs(m.inputs); buildSeqs(m.sequences);
      $("#fw").textContent="fw "+m.fw; net(m.net); setGame(m.game); break;
    case "relay": setRelay(m.i,m.on); break;
    case "input": setInput(m.i,m.high); break;
    case "net":   net(m); break;
    case "game":  setGame(m.running); break;
    case "hb":    beat(); break;
    case "log":   logLine(m.msg); break;
  }
}

/* ---- relays ---- */
function buildRelays(list){
  const g=$("#relays"); g.innerHTML="";
  list.forEach(r=>{
    const b=document.createElement("button");
    b.className="tile"+(r.en?"":" disabled"); b.dataset.type=r.type; b.id="r"+r.i;
    b.innerHTML=`<div class="idx">R${String(r.i+1).padStart(2,"0")} · ${TYPE[r.type]}</div>
      <div class="nm">${esc(r.name)}</div><div class="st">off</div>`;
    b.onclick=()=>send({cmd:"toggle",i:r.i});
    g.appendChild(b); setRelay(r.i,r.on);
  });
}
function setRelay(i,on){
  const t=$("#r"+i); if(!t) return;
  t.classList.toggle("on",on); t.querySelector(".st").textContent=on?"on":"off";
}

/* ---- scenes ---- */
function buildSeqs(list){
  const g=$("#seqs"); g.innerHTML="";
  (list||[]).forEach(s=>{
    const b=document.createElement("button");
    b.className="scene"+(s.en?"":" disabled");
    b.textContent=s.name;
    b.onclick=()=>{
      send({cmd:"seq",i:s.i});
      b.classList.add("flash"); setTimeout(()=>b.classList.remove("flash"),180);
    };
    g.appendChild(b);
  });
}

/* ---- inputs ---- */
function buildInputs(list){
  const g=$("#inputs"); g.innerHTML="";
  list.forEach(s=>{
    const d=document.createElement("div");
    d.className="chip"; d.id="i"+s.i;
    d.innerHTML=`<span class="led"></span><span class="lbl">${esc(s.name)}</span>`;
    g.appendChild(d); setInput(s.i,s.high);
  });
}
function setInput(i,hi){
  const c=$("#i"+i); if(!c) return; c.classList.toggle("hi",hi);
}

/* ---- net / game / heartbeat ---- */
function net(n){
  const up=n.eth||n.wifi;
  $("#linkDot").className="dot "+(up?"live":"dead");
  $("#linkTxt").textContent=n.eth?"Ethernet":(n.wifi?"Wi-Fi secours":"hors ligne");
  $("#ip").textContent=n.ip||"—";
}
function setGame(r){
  game=r;
  $("#gameBadge").textContent=r?"en cours":"arrêtée";
  $("#gameBadge").classList.toggle("run",r);
  $("#gameBtn").textContent=r?"Arrêter":"Démarrer";
}
$("#gameBtn").onclick=()=>send({cmd:"game",running:!game});

function beat(){
  const d=$("#hbDot"); d.className="dot live"; $("#hbTxt").textContent="OK";
  clearTimeout(hbTimer);
  hbTimer=setTimeout(()=>{ d.className="dot dead"; $("#hbTxt").textContent="silence"; },12000);
}

/* ---- log ---- */
function logLine(msg){
  const l=$("#log");
  const t=new Date().toLocaleTimeString();
  const row=document.createElement("div");
  row.innerHTML=`<b>${t}</b>  ${esc(msg)}`;
  l.prepend(row);
  while(l.childElementCount>60) l.removeChild(l.lastChild);
}
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

connect();
</script>
</body>
</html>
